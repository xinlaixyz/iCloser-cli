name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ════════════════════════════════════════════════════════════
  # Fast gate — lint + typecheck, catches basic issues in <2min
  # ════════════════════════════════════════════════════════════
  gate:
    name: Gate (lint + tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ════════════════════════════════════════════════════════════
  # Test matrix — unit tests across Node versions
  # ════════════════════════════════════════════════════════════
  test:
    name: Test (Node ${{ matrix.node }})
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: Coverage (Node 22 only)
        if: matrix.node == '22'
        run: npm run test:coverage -- --reporter=text-summary

  # ════════════════════════════════════════════════════════════
  # Multi-platform smoke — build + smoke on all 3 OSes
  # ════════════════════════════════════════════════════════════
  smoke:
    name: Smoke (${{ matrix.os }})
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Release smoke
        run: npm run smoke

  # ════════════════════════════════════════════════════════════
  # Docker build check — ensures Dockerfile works
  # ════════════════════════════════════════════════════════════
  docker:
    name: Docker build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t icloser:ci .

      - name: Smoke Docker image
        run: docker run --rm icloser:ci --version

  # ════════════════════════════════════════════════════════════
  # AI Capability Gate — validates tool-calling, web access, tool-loop
  # ════════════════════════════════════════════════════════════
  ai-capability:
    name: AI Capability Gate
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: AI capability smoke
        run: npm run smoke:ai
