name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ════════════════════════════════════════════════════════════
  # Tier 1 — Quick Gate (<10s execution): lint + typecheck
  # Immediate feedback on push; no blockers past this point.
  # ════════════════════════════════════════════════════════════
  quick:
    name: Quick (tsc + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Release trust budget
        run: npm run release:trust -- --no-report

  # ════════════════════════════════════════════════════════════
  # Tier 2 — Acceptance (<30s execution): unit tests
  # Validates logic correctness across Node LTS versions.
  # ════════════════════════════════════════════════════════════
  acceptance:
    name: Tests (Node ${{ matrix.node }})
    needs: quick
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: Coverage (Node 22 only)
        if: matrix.node == '22'
        run: npm run test:coverage -- --reporter=text-summary

  # ════════════════════════════════════════════════════════════
  # Tier 3 — Full (<120s execution): multi-OS smoke
  # FIX-03: macOS runs complete sequence: tsc→lint→test→smoke
  # ════════════════════════════════════════════════════════════
  smoke:
    name: Smoke (${{ matrix.os }})
    needs: acceptance
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      # FIX-03: macOS-specific full sequence (tsc → lint → test)
      - name: TypeScript check (macOS)
        if: matrix.os == 'macos-latest'
        run: npx tsc --noEmit

      - name: Lint (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run lint

      - name: Unit tests (macOS)
        if: matrix.os == 'macos-latest'
        run: npm test

      - name: Smoke
        run: npm run smoke

  # ════════════════════════════════════════════════════════════
  # Docker build check — ensures Dockerfile works
  # ════════════════════════════════════════════════════════════
  docker:
    name: Docker build
    needs: acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t icloser:ci .

      - name: Smoke Docker image
        run: docker run --rm icloser:ci --version

  # ════════════════════════════════════════════════════════════
  # AI Capability Gate — validates tool-calling, web access, tool-loop
  # ════════════════════════════════════════════════════════════
  ai-capability:
    name: AI Capability Gate
    needs: acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: AI capability smoke
        run: npm run smoke:ai
