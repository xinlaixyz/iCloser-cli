name: Release Smoke

# P1-11: Reduced to PR-only to avoid duplicating ci.yml.
# ci.yml handles push to main/master with full matrix + Docker check.
on:
  pull_request:

env:
  NODE_VERSION: '22'

jobs:
  # ════════════════════════════════════════════════════════════
  # Tier 1 — Quick Gate (<10s): lint + typecheck
  # ════════════════════════════════════════════════════════════
  quick:
    name: Quick Gate (tsc + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Lint check
        run: npm run lint

      - name: Release trust budget
        run: npm run release:trust -- --no-report

  # ════════════════════════════════════════════════════════════
  # Tier 2 — Acceptance (<30s): unit tests
  # ════════════════════════════════════════════════════════════
  acceptance:
    name: Acceptance Tests
    needs: quick
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

  # ════════════════════════════════════════════════════════════
  # Tier 3 — Full (<120s): multi-OS smoke
  # FIX-03: macOS runs complete sequence: tsc→lint→test→smoke
  # ════════════════════════════════════════════════════════════
  smoke:
    name: Smoke (${{ matrix.os }})
    needs: acceptance
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - '22'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # FIX-03: macOS runs the full developer acceptance sequence
      - name: TypeScript check (macOS)
        if: matrix.os == 'macos-latest'
        run: npx tsc --noEmit

      - name: Lint (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run lint

      - name: Unit tests (macOS)
        if: matrix.os == 'macos-latest'
        run: npm test

      - name: Release smoke
        run: npm run smoke

      - name: Tool capability smoke
        run: npm run smoke:tools

      - name: macOS developer acceptance
        if: matrix.os == 'macos-latest'
        run: npm run macos:acceptance -- --ci-smoke
