name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io

jobs:
  # ════════════════════════════════════════════════════════════
  # Full CI pre-flight — gate + test + smoke before any publish
  # ════════════════════════════════════════════════════════════
  preflight:
    name: Pre-flight (lint + test + smoke)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke
        run: npm run smoke

  # ════════════════════════════════════════════════════════════
  # npm publish — with provenance attestation
  # ════════════════════════════════════════════════════════════
  npm-publish:
    name: Publish to npm
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org/'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish
        run: npm publish --tag latest --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ════════════════════════════════════════════════════════════
  # Docker — build + push to GitHub Container Registry
  # ════════════════════════════════════════════════════════════
  docker:
    name: Docker (${{ matrix.platform }})
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════
  # Build offline dist packages (macOS + Windows zip)
  # ════════════════════════════════════════════════════════════
  dist:
    name: Dist packages
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Package for distribution
        run: npm run package

      - name: Create platform archives
        run: |
          mkdir -p release-artifacts
          # Create tarball for Linux/macOS
          tar -czf release-artifacts/icloser-linux-x64.tar.gz -C dist .
          # Copy npm package tarball
          cp icloser-agent-shell-*.tgz release-artifacts/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: release-artifacts/

  # ════════════════════════════════════════════════════════════
  # GitHub Release — changelog + artifacts
  # ════════════════════════════════════════════════════════════
  github-release:
    name: GitHub Release
    needs: [npm-publish, docker, dist]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: release-artifacts/

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: .github/changelog-config.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: true
          files: release-artifacts/*
          fail_on_unmatched_files: false
