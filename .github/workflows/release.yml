name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io

jobs:
  # ════════════════════════════════════════════════════════════
  # Full CI pre-flight — gate + test + smoke before any publish
  # ════════════════════════════════════════════════════════════
  preflight:
    name: Pre-flight (lint + test + smoke)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke
        run: npm run smoke

  # ════════════════════════════════════════════════════════════
  # npm publish — with provenance attestation
  # ════════════════════════════════════════════════════════════
  npm-publish:
    name: Publish to npm
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org/'
          cache: npm

      - run: npm ci
      - run: npm run build

      # preflight already ran the full quality gate across 3 OSes, so skip the
      # prepublishOnly (release:trust:full) hook here to avoid a redundant ~10min
      # re-run inside this job.
      - name: Publish
        run: npm publish --tag latest --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ════════════════════════════════════════════════════════════
  # Docker — build + push to GitHub Container Registry
  # ════════════════════════════════════════════════════════════
  docker:
    name: Docker (${{ matrix.platform }})
    needs: preflight
    # Best-effort: a Docker/ghcr hiccup must never block npm publish or the release.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════
  # Build offline dist packages (Linux/macOS tar.gz + Windows zip),
  # each built natively so binaries match the target platform.
  # ════════════════════════════════════════════════════════════
  dist-linux:
    name: Dist (Linux/macOS tar.gz + npm tgz)
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Build offline portable package (tar.gz)
        run: npm run package

      - name: Pack npm tarball
        run: npm pack

      - name: Stage release artifacts
        run: |
          mkdir -p release-artifacts
          cp out/*.tar.gz release-artifacts/ 2>/dev/null || true
          cp icloser-*.tgz release-artifacts/ 2>/dev/null || true
          ls -la release-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: release-artifacts/

  dist-windows:
    name: Dist (Windows zip)
    needs: preflight
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Build offline portable package (zip)
        run: npm run package

      - name: Stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          Copy-Item out/*.zip release-artifacts/ -ErrorAction SilentlyContinue
          Get-ChildItem release-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: release-artifacts/

  # ════════════════════════════════════════════════════════════
  # GitHub Release — changelog + artifacts
  # ════════════════════════════════════════════════════════════
  github-release:
    name: GitHub Release
    # Gated on npm publish + dist packaging only. Docker is best-effort and must
    # not block the release.
    needs: [npm-publish, dist-linux, dist-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Download every uploaded artifact (dist-linux, dist-windows) into subdirs.
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: .github/changelog-config.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: true
          files: release-artifacts/**/*
          fail_on_unmatched_files: false
